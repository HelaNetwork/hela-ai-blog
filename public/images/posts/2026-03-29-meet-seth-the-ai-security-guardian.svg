<svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;">
  <!-- background -->
  <rect width="120" height="80" fill="#0a0614"/>
  <!-- shield body (pixel-art shield shape) -->
  <rect x="34" y="8" width="52" height="4" fill="#300614"/>
  <rect x="30" y="12" width="60" height="4" fill="#300614"/>
  <rect x="26" y="16" width="68" height="4" fill="#400818"/>
  <rect x="26" y="20" width="68" height="4" fill="#400818"/>
  <rect x="26" y="24" width="68" height="4" fill="#400818"/>
  <rect x="26" y="28" width="68" height="4" fill="#400818"/>
  <rect x="26" y="32" width="68" height="4" fill="#400818"/>
  <rect x="26" y="36" width="68" height="4" fill="#400818"/>
  <rect x="30" y="40" width="60" height="4" fill="#400818"/>
  <rect x="34" y="44" width="52" height="4" fill="#300614"/>
  <rect x="38" y="48" width="44" height="4" fill="#300614"/>
  <rect x="44" y="52" width="32" height="4" fill="#300614"/>
  <rect x="50" y="56" width="20" height="4" fill="#300614"/>
  <rect x="56" y="60" width="8" height="4" fill="#300614"/>
  <!-- shield border -->
  <rect x="34" y="8" width="52" height="2" fill="#ff3c6f"/>
  <rect x="26" y="16" width="68" height="2" fill="#ff3c6f" opacity="0.6"/>
  <!-- red visor eye (center of shield) -->
  <rect x="44" y="22" width="32" height="16" fill="#200010" stroke="#ff3c6f" stroke-width="1"/>
  <rect x="46" y="24" width="28" height="12" fill="#ff3c6f" opacity="0.2"/>
  <!-- eye pupil glow -->
  <rect x="54" y="26" width="12" height="8" fill="#ff3c6f" opacity="0.6"/>
  <rect x="58" y="28" width="4" height="4" fill="#ff3c6f"/>
  <!-- alert triangles -->
  <rect x="6" y="14" width="2" height="10" fill="#ffe94d" opacity="0.7"/>
  <rect x="4" y="24" width="6" height="2" fill="#ffe94d" opacity="0.7"/>
  <rect x="8" y="22" width="2" height="2" fill="#ffe94d"/>
  <rect x="112" y="14" width="2" height="10" fill="#ffe94d" opacity="0.7"/>
  <rect x="110" y="24" width="6" height="2" fill="#ffe94d" opacity="0.7"/>
  <rect x="110" y="22" width="2" height="2" fill="#ffe94d"/>
  <!-- DENY stamp -->
  <rect x="38" y="66" width="44" height="10" fill="#200008" stroke="#ff3c6f" stroke-width="1"/>
  <text x="60" y="74" font-family="'Press Start 2P',monospace" font-size="5" fill="#ff3c6f" text-anchor="middle">DENY</text>
</svg>
