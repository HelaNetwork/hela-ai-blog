<svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;">
  <!-- background -->
  <rect width="120" height="80" fill="#060a1a"/>
  <!-- center divider -->
  <line x1="60" y1="4" x2="60" y2="76" stroke="#C6F135" stroke-width="1" stroke-dasharray="4 2" opacity="0.4"/>
  <!-- BEFORE label -->
  <text x="30" y="10" font-family="'Press Start 2P',monospace" font-size="4" fill="#3cf0ff" opacity="0.5" text-anchor="middle">BEFORE</text>
  <!-- AFTER label -->
  <text x="90" y="10" font-family="'Press Start 2P',monospace" font-size="4" fill="#C6F135" text-anchor="middle">AFTER</text>
  <!-- Left: wireframe Max (outline only) -->
  <!-- body outline -->
  <rect x="14" y="28" width="30" height="28" fill="none" stroke="#3cf0ff" stroke-width="1" opacity="0.6"/>
  <!-- head outline -->
  <rect x="19" y="16" width="20" height="14" fill="none" stroke="#3cf0ff" stroke-width="1" opacity="0.6"/>
  <!-- wireframe eyes -->
  <rect x="22" y="20" width="4" height="4" fill="none" stroke="#3cf0ff" stroke-width="1" opacity="0.5"/>
  <rect x="30" y="20" width="4" height="4" fill="none" stroke="#3cf0ff" stroke-width="1" opacity="0.5"/>
  <!-- wireframe mouth -->
  <rect x="22" y="27" width="12" height="2" fill="none" stroke="#3cf0ff" stroke-width="0.5" opacity="0.4"/>
  <!-- Right: colored Max (filled pixel art) -->
  <!-- body filled -->
  <rect x="76" y="28" width="30" height="28" fill="#1a3a06"/>
  <rect x="78" y="30" width="4" height="4" fill="#C6F135" opacity="0.3"/>
  <rect x="84" y="30" width="4" height="4" fill="#C6F135" opacity="0.3"/>
  <rect x="90" y="30" width="4" height="4" fill="#C6F135" opacity="0.3"/>
  <rect x="96" y="30" width="6" height="4" fill="#C6F135" opacity="0.2"/>
  <!-- head filled -->
  <rect x="81" y="16" width="20" height="14" fill="#2a5a0a"/>
  <!-- colored eyes -->
  <rect x="84" y="20" width="4" height="4" fill="#C6F135"/>
  <rect x="92" y="20" width="4" height="4" fill="#C6F135"/>
  <!-- smile -->
  <rect x="84" y="27" width="12" height="2" fill="#C6F135" opacity="0.8"/>
  <!-- wave hand -->
  <rect x="104" y="28" width="6" height="4" fill="#2a5a0a"/>
  <rect x="108" y="24" width="4" height="6" fill="#2a5a0a"/>
  <!-- bottom label -->
  <text x="60" y="74" font-family="'Press Start 2P',monospace" font-size="4" fill="#C6F135" text-anchor="middle">PIXEL MAKEOVER</text>
</svg>
