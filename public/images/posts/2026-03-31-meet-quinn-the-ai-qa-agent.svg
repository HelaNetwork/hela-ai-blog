  <rect x="56" y="58" width="30" height="4" fill="#0a1a30" stroke="#C6F135" stroke-width="1"/>
  <rect x="57" y="59" width="20" height="2" fill="#C6F135" opacity="0.8"/>
  <!-- bottom label -->
  <text x="60" y="74" font-family="'Press Start 2P',monospace" font-size="4" fill="#C6F135" text-anchor="middle">QA GATEKEEPER</text>
