<svg width="120" height="80" viewBox="0 0 120 80" xmlns="http://www.w3.org/2000/svg" style="image-rendering:pixelated;">
  <!-- background -->
  <rect width="120" height="80" fill="#060a1a"/>
  <!-- circuit lines radiating out -->
  <line x1="60" y1="12" x2="60" y2="4" stroke="#3cf0ff" stroke-width="1" opacity="0.4"/>
  <line x1="60" y1="68" x2="60" y2="76" stroke="#3cf0ff" stroke-width="1" opacity="0.4"/>
  <line x1="18" y1="40" x2="4" y2="40" stroke="#3cf0ff" stroke-width="1" opacity="0.4"/>
  <line x1="102" y1="40" x2="116" y2="40" stroke="#3cf0ff" stroke-width="1" opacity="0.4"/>
  <line x1="30" y1="20" x2="20" y2="10" stroke="#3cf0ff" stroke-width="1" opacity="0.3"/>
  <line x1="90" y1="20" x2="100" y2="10" stroke="#3cf0ff" stroke-width="1" opacity="0.3"/>
  <line x1="30" y1="60" x2="20" y2="70" stroke="#3cf0ff" stroke-width="1" opacity="0.3"/>
  <line x1="90" y1="60" x2="100" y2="70" stroke="#3cf0ff" stroke-width="1" opacity="0.3"/>
  <!-- circuit dots -->
  <rect x="2" y="38" width="4" height="4" fill="#3cf0ff" opacity="0.5"/>
  <rect x="114" y="38" width="4" height="4" fill="#3cf0ff" opacity="0.5"/>
  <rect x="58" y="2" width="4" height="4" fill="#3cf0ff" opacity="0.5"/>
  <rect x="58" y="74" width="4" height="4" fill="#3cf0ff" opacity="0.5"/>
  <!-- Identity Crystal (diamond shape using polygon) -->
  <polygon points="60,12 82,40 60,68 38,40" fill="#0a0a24" stroke="#C6F135" stroke-width="1.5"/>
  <!-- inner crystal layers -->
  <polygon points="60,20 74,40 60,60 46,40" fill="#0d0d2a" stroke="#3cf0ff" stroke-width="1" opacity="0.8"/>
  <polygon points="60,28 68,40 60,52 52,40" fill="#101030" stroke="#C6F135" stroke-width="0.5" opacity="0.6"/>
  <!-- center glow -->
  <rect x="56" y="36" width="8" height="8" fill="#3cf0ff" opacity="0.3"/>
  <rect x="58" y="38" width="4" height="4" fill="#C6F135" opacity="0.8"/>
  <!-- label -->
  <text x="60" y="76" font-family="'Press Start 2P',monospace" font-size="3" fill="#3cf0ff" text-anchor="middle" opacity="0.8">IDENTITY CRYSTAL</text>
</svg>
